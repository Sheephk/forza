        .fixed-bg {

            background-image: radial-gradient(circle at 30% 20%, #f2effa 0%, transparent 60%),

            justify-content: flex-start;
            align-items: center;
        }

        h1 {
            font-size: 4vh;
            margin: 4px 0 10px 0; 
            color: var(--accent);
            letter-spacing: 2px;
            font-weight: 700;

            align-items: center;

            height: 64px;
            object-fit: contain;
        }
        
        /* UPDATED: Changed justify-content to flex-start so wrapped rows align left */
        .dashboard-container {
            width: 95%;
            max-width: 1200px;
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
            gap: 8px; 
            justify-content: flex-start; 
            align-items: flex-start;
            margin: 0 auto; /* Keeps the entire container block centered on the screen */
        }

        .dashboard-panel {
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: 16px;
            padding: 3px;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.04), 
                        inset 0 1px 1px rgba(255,255,255,0.8);
            flex: 1 1 300px;  /* <--- 這邊控制了基礎大小 */
            max-width: 100%;
        }

        @media (min-width: 768px) {
            .dashboard-panel {
                max-width: 350px;

            }
        }

        .content-section {
            text-align: center;
            background: var(--panel-bg);
            padding: 10px 14px;
            border-radius: 13px;
            border: 1px solid rgba(0,0,0,0.01);
            height: 100%;
        }

        .content-title {
            font-size: 2.1vh;
            color: var(--accent);
            margin-bottom: 4px; 
            letter-spacing: 1.5px;
            font-weight: bold;
            border-bottom: 1px solid rgba(0,0,0,0.06);
            padding-bottom: 4px;
            text-shadow: 1px 1px 0 var(--text-reflection);
        }

        .icon-links {
            display: flex;
            flex-direction: column;
            gap: 2px; 
            align-items: flex-start;
        }

        .icon-link-item {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            color: var(--text-main);
            font-size: 2vh;
            font-weight: 500;
            transition: all 0.2s ease;
            width: 100%;
            padding: 4px 12px; 
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.005);
            border: 1px solid transparent;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.4);
        }

        .icon-link-item:hover {
            transform: translateX(3px);
            background: var(--hover-bg);
            border-color: rgba(0, 0, 0, 0.03);
        }

        .icon-btn {
            font-size: 2vh; /* <--- 這邊控制方框文字大小 */
            filter: drop-shadow(0 1px 2px rgba(0,0,0,0.05));
        }

        footer {

            padding: 10px;

            flex-direction: column;
            gap: 4px;

            color: var(--text-dim);
            font-size: 1.3vh;
            font-weight: 500;
